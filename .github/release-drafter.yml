name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
version-template: "$MAJOR.$MINOR.$PATCH"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
sort-direction: ascending

categories:
  - title: "💥 Breaking Changes"
    labels:
      - "breaking-change"
  - title: "✨ New Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "fix"
      - "bugfix"
      - "bug"
  - title: "🔧 Maintenance"
    labels:
      - "chore"
      - "ci"
      - "documentation"
      - "dependencies"
      - "refactor"
      - "test"
    collapse-after: 3

autolabeler:
  - label: "breaking-change"
    title:
      - '/^[a-z]+(\([^)]+\))?!:/i'
  - label: "feature"
    branch:
      - "/^feat/"
      - "/^feature/"
    title:
      - '/^feat(\([^)]+\))?:/i'
  - label: "bugfix"
    branch:
      - "/^fix/"
      - "/^bugfix/"
    title:
      - '/^fix(\([^)]+\))?:/i'
  - label: "refactor"
    branch:
      - "/^refactor/"
    title:
      - '/^refactor(\([^)]+\))?:/i'
  - label: "ci"
    title:
      - '/^ci(\([^)]+\))?:/i'
  - label: "chore"
    branch:
      - "/^chore/"
    title:
      - '/^chore(\([^)]+\))?:/i'
  - label: "documentation"
    branch:
      - "/^docs/"
    title:
      - '/^docs(\([^)]+\))?:/i'
    files:
      - "README.md"
      - "docs/**/*"
  - label: "test"
    title:
      - '/^test(\([^)]+\))?:/i'
  - label: "dependencies"
    branch:
      - "/^dependabot/"
    title:
      - '/^build\(deps\):/i'
      - '/^chore\(deps\):/i'
      - '/^Bump /i'

version-resolver:
  major:
    labels:
      - "breaking-change"
  minor:
    labels:
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "bugfix"
      - "bug"
      - "fix"
      - "refactor"
      - "chore"
      - "ci"
      - "documentation"
      - "dependencies"
      - "test"
  default: patch

template: |
  [![PyPI Downloads](https://img.shields.io/pypi/dm/py-nationalgrid.svg)](https://pypi.org/project/py-nationalgrid/)

  $CHANGES
